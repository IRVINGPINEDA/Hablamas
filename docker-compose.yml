services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hablamas
      POSTGRES_USER: habla
      POSTGRES_PASSWORD: hablapw
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      Redis__ConnectionString: ${Redis__ConnectionString}
      APP_BASE_URL: ${APP_BASE_URL}
      JWT__Issuer: ${JWT__Issuer}
      JWT__Audience: ${JWT__Audience}
      JWT__Key: ${JWT__Key}
      SMTP__Host: ${SMTP__Host}
      SMTP__Port: ${SMTP__Port}
      SMTP__User: ${SMTP__User}
      SMTP__Pass: ${SMTP__Pass}
      SMTP__From: ${SMTP__From}
      SMTP__FromName: ${SMTP__FromName:-Habla Mas}
      UPLOADS__Path: ${UPLOADS__Path}
      UPLOADS__MaxMb: ${UPLOADS__MaxMb}
      GROQ__ApiKey: ${GROQ__ApiKey}
      GROQ__Model: ${GROQ__Model:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ__BaseUrl: ${GROQ__BaseUrl:-https://api.groq.com/openai/v1}
      GROQ__MaxImageMb: ${GROQ__MaxImageMb:-4}
      UPLOADS__MaxAttachmentMb: ${UPLOADS__MaxAttachmentMb:-25}
      AI__Provider: ${AI__Provider:-groq}
      OPENAI__ApiKey: ${OPENAI__ApiKey}
      OPENAI__Model: ${OPENAI__Model:-gpt-4o-mini}
      OPENAI__BaseUrl: ${OPENAI__BaseUrl:-https://api.openai.com/v1}
      ANTHROPIC__ApiKey: ${ANTHROPIC__ApiKey}
      ANTHROPIC__Model: ${ANTHROPIC__Model:-claude-3-5-sonnet-latest}
      ANTHROPIC__BaseUrl: ${ANTHROPIC__BaseUrl:-https://api.anthropic.com/v1}
      ANTHROPIC__Version: ${ANTHROPIC__Version:-2023-06-01}
      ANTHROPIC__MaxTokens: ${ANTHROPIC__MaxTokens:-1024}
      ADMIN__SeedEmail: ${ADMIN__SeedEmail}
      ADMIN__SeedPassword: ${ADMIN__SeedPassword}
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    volumes:
      - uploads:${UPLOADS__Path}

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      VITE_DEV_PROXY_TARGET: http://api:8080
      VITE_API_BASE_URL: /api
      VITE_HUB_URL: /hubs/chat
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
